<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vaxta Edge — Dashboard competitivo</title>
<style>
:root {
  --surface-1: #fcfcfb; --page:#f9f9f7; --text-primary:#0b0b0b; --text-secondary:#52514e;
  --text-muted:#898781; --gridline:#e1e0d9; --gridline-strong:#cfceC6; --baseline:#c3c2b7;
  --border: rgba(11,11,11,0.10);
  --series-1: #2a78d6; --series-focus:#e34948;
  --good-wash:#e6f6e6; --series-1-wash:#e8f0fb; --warn-wash:#fdf3e0; --crit-wash:#fbe4e2;
  --good-ink:#006300; --blue-ink:#184f95; --warn-ink:#8a5a00; --crit-ink:#9c2b2b;
}
@media (prefers-color-scheme: dark) {
  :root {
    --surface-1:#1a1a19; --page:#0d0d0d; --text-primary:#fff; --text-secondary:#c3c2b7;
    --text-muted:#898781; --gridline:#2c2c2a; --gridline-strong:#3a3a37; --baseline:#383835;
    --border: rgba(255,255,255,0.10);
    --series-1:#3987e5; --series-focus:#e66767;
    --good-wash:#10240f; --series-1-wash:#17263a; --warn-wash:#2a2318; --crit-wash:#301c1c;
    --good-ink:#0ca30c; --blue-ink:#86b6ef; --warn-ink:#dba53a; --crit-ink:#e66767;
  }
}
* { box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  color: var(--text-primary); background: var(--page); margin: 0;
  padding: 24px 20px 40px;
}
.wrap { max-width: 760px; margin: 0 auto; }
.hdr h1 { font-size: 19px; margin: 0 0 4px; }
.hdr p { font-size: 12.5px; color: var(--text-secondary); margin: 0 0 18px; }

.selector-row { display:flex; gap:10px; margin-bottom: 18px; flex-wrap: wrap; align-items: flex-start; }
.search-box { position: relative; flex: 1; min-width: 260px; }
input[type=text], select {
  width: 100%; font-family: inherit; font-size: 14px; padding: 10px 12px;
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface-1); color: var(--text-primary);
}
select { min-width: 190px; }
.dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
  max-height: 260px; overflow-y: auto; z-index: 10; display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
}
.dropdown.open { display: block; }
.dropdown .opt { padding: 9px 12px; font-size: 13px; cursor: pointer; }
.dropdown .opt:hover, .dropdown .opt.active { background: var(--series-1-wash); }
.dropdown .opt .mk { font-size: 11px; color: var(--text-muted); }

.card { background: var(--surface-1); border:1px solid var(--border); border-radius:12px; padding:18px 18px 14px; margin-bottom: 16px; }
.card h2 { font-size: 14px; margin: 0 0 2px; }
.card .sub { font-size: 11.5px; color: var(--text-muted); margin: 0 0 10px; }

.stats { display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.stat-tile { background: var(--surface-1); border:1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
.stat-tile .k { font-size: 11.5px; color: var(--text-muted); margin-bottom: 6px; }
.stat-tile .v { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
.stat-tile .delta { font-size: 11px; margin-top: 4px; font-variant-numeric: tabular-nums; }
.delta.up { color: var(--good-ink); } .delta.down { color: var(--crit-ink); } .delta.flat { color: var(--text-muted); }

.grid2 { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.barschart { display:flex; align-items:flex-end; gap:5px; height:130px; position:relative; }
.barschart .col { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; position:relative; }
.barschart .bar { width: 100%; max-width: 32px; background: var(--series-1); border-radius: 4px 4px 0 0; position: relative; min-height: 2px; }
.barschart .lbl { font-size: 10px; color: var(--text-muted); margin-top: 6px; }
.barschart .val { font-size: 9px; color: var(--text-secondary); position:absolute; top:-14px; left:0; right:0; text-align:center; font-variant-numeric:tabular-nums; }

.hourschart { display:flex; align-items:flex-end; gap:3px; height:120px; padding-top: 16px; }
.hourschart .col { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; position: relative; }
.hourschart .bar { width:100%; background: var(--series-1); opacity: 0.85; border-radius:3px 3px 0 0; min-height:2px; position: relative; }
.hourschart .val { font-size: 8px; color: var(--text-secondary); position: absolute; top: -14px; left: 0; right: 0; text-align: center; font-variant-numeric: tabular-nums; white-space: nowrap; }
.hourschart .lbl { font-size:8.5px; color:var(--text-muted); margin-top:5px; writing-mode: vertical-rl; transform: rotate(180deg); height: 24px; }
svg { width: 100%; height: auto; overflow: visible; }
.axis-lbl { font-size: 9.5px; fill: var(--text-muted); }
.quad-label { font-size: 10px; font-weight: 700; letter-spacing: 0.03em; }
.quad-label.good { fill: var(--good-ink); } .quad-label.blue { fill: var(--blue-ink); }
.quad-label.warn { fill: var(--warn-ink); } .quad-label.crit { fill: var(--crit-ink); }
.pt-label { font-size: 9px; fill: var(--text-secondary); }
.pt-label.focus { fill: var(--series-focus); font-weight: 700; font-size: 10px; }
.line-label { font-size: 10px; fill: var(--text-muted); }
.line-label.focus { fill: var(--series-focus); font-weight: 700; }
.bar-lbl { font-size: 11px; fill: var(--text-secondary); }
.bar-lbl.focus { fill: var(--series-focus); font-weight: 700; }
.bar-val { font-size: 10.5px; fill: var(--text-muted); font-variant-numeric: tabular-nums; }
.legend { display:flex; flex-wrap:wrap; gap: 10px 16px; margin-top: 10px; font-size: 11px; color: var(--text-secondary); }
.legend .item { display:flex; align-items:center; gap:6px; }
.legend .dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; }
.legend .item.focus { font-weight: 700; color: var(--series-focus); }
.note { font-size: 11px; color: var(--text-muted); margin: 8px 0 0; }
.empty { font-size: 13px; color: var(--text-muted); padding: 30px 0; text-align: center; }

.end-lbl { font-size: 9.5px; font-weight: 600; font-variant-numeric: tabular-nums; }
.end-lbl.focus { fill: var(--series-focus); font-weight: 700; }
.hover-col { fill: transparent; }
.chart-tooltip {
  position: fixed; display: none; pointer-events: none; z-index: 100;
  background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 10px; font-size: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  max-width: 220px;
}
.chart-tooltip .tt-club { font-weight: 700; margin-bottom: 2px; display:flex; align-items:center; gap:6px; }
.chart-tooltip .tt-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink:0; }
.chart-tooltip .tt-val { font-variant-numeric: tabular-nums; color: var(--text-secondary); }
.chart-tooltip .tt-est { font-size: 10.5px; color: var(--warn-ink); margin-top: 2px; }
.loading { font-size: 13px; color: var(--text-muted); padding: 30px 0; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>Vaxta Edge — Dashboard competitivo</h1>
    <p>Etapa 2: cualquier club, cualquier semana, contra sus vecinos reales dentro de 10km.</p>
  </div>

  <div class="selector-row">
    <div class="search-box">
      <input type="text" id="buscador" placeholder="Busca un club por nombre…" autocomplete="off">
      <div class="dropdown" id="dropdown"></div>
    </div>
    <select id="semanaSel"></select>
  </div>

  <div id="resultado">
    <div class="empty">Busca y selecciona un club para ver su comparación competitiva.</div>
  </div>
</div>

<div class="chart-tooltip" id="chartTooltip"></div>

<script>
let CLUBES = [];
let SEMANAS = [];
let clubSeleccionado = null;
let ultimaData = null;

async function cargarClubes() {
  const res = await fetch('/api/clubes');
  CLUBES = await res.json();
}

async function cargarSemanas() {
  const res = await fetch('/api/semanas');
  SEMANAS = await res.json();
  const sel = document.getElementById('semanaSel');
  sel.innerHTML = SEMANAS.map(s => {
    const f = new Date(s + 'T00:00:00');
    const label = f.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
    return `<option value="${s}">Semana del ${label}</option>`;
  }).join('');
  sel.value = SEMANAS[SEMANAS.length - 1];
}

const input = document.getElementById('buscador');
const dropdown = document.getElementById('dropdown');
const semanaSel = document.getElementById('semanaSel');

input.addEventListener('input', () => {
  const q = input.value.trim().toLowerCase();
  if (!q) { dropdown.classList.remove('open'); return; }
  const matches = CLUBES.filter(c => c.nombre.toLowerCase().includes(q)).slice(0, 20);
  dropdown.innerHTML = matches.map(c =>
    `<div class="opt" data-id="${c.id}">${c.nombre}<div class="mk">${c.mercado || ''}</div></div>`
  ).join('');
  dropdown.classList.toggle('open', matches.length > 0);
});

dropdown.addEventListener('click', (e) => {
  const opt = e.target.closest('.opt');
  if (!opt) return;
  const club = CLUBES.find(c => c.id === opt.dataset.id);
  input.value = club.nombre;
  dropdown.classList.remove('open');
  cargarComparacion(club.id);
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-box')) dropdown.classList.remove('open');
});

semanaSel.addEventListener('change', () => {
  if (clubSeleccionado) cargarComparacion(clubSeleccionado);
});

async function cargarComparacion(id) {
  clubSeleccionado = id;
  document.getElementById('resultado').innerHTML = '<div class="loading">Cargando datos reales de Supabase…</div>';
  const semana = semanaSel.value;
  const res = await fetch(`/api/comparacion/${id}?semana=${semana}`);
  const data = await res.json();
  ultimaData = data;
  renderResultado(data);
}

function fmtMXN(n) { return n == null ? '—' : '$' + Math.round(n).toLocaleString('es-MX'); }
function fmtPct(n) { return n == null ? '—' : Number(n).toFixed(1) + '%'; }
function mediana(arr) {
  const s = [...arr].sort((a,b) => a-b);
  const mid = Math.floor(s.length/2);
  return s.length % 2 ? s[mid] : (s[mid-1]+s[mid])/2;
}

function renderResultado(data) {
  const cont = document.getElementById('resultado');
  if (data.error) { cont.innerHTML = `<div class="empty">${data.error}</div>`; return; }

  const cuad = data.cuadrante;
  const hayCuadrante = cuad.club && cuad.vecinos.length > 0;
  const hayHoras = Object.keys(data.precio_hora).length > 0;
  const hayIngresoSemana = Object.keys(data.ingreso_semana).length > 0;
  const hayTendencia = data.tendencia_rows.length > 0;
  const hayResumen = !!data.resumen_actual;
  const hayDias = data.dias && data.dias.length > 0;
  const hayHorasOcup = data.horas_ocupacion && data.horas_ocupacion.length > 0;

  cont.innerHTML = `
    ${data.club.cerrado_temporalmente ? `
    <div class="card" style="border-color: var(--warn-ink);">
      <p class="sub" style="margin:0; color: var(--warn-ink); font-weight:600;">
        ⚠ ${data.club.nombre} aparece cerrado temporalmente desde el ${data.club.cerrado_desde}
        (ocupación 100% sin variación por varios días — detectado automáticamente, no confirmado con el club).
        Los datos desde esa fecha no se incluyen en los reportes; su historial de antes sigue intacto.
      </p>
    </div>` : ''}
    ${hayResumen ? `
    <div class="stats">
      <div class="stat-tile">
        <div class="k">Ingreso total</div>
        <div class="v" id="statIngreso">—</div>
        <div class="delta" id="deltaIngreso"></div>
      </div>
      <div class="stat-tile">
        <div class="k">Ingreso por cancha</div>
        <div class="v" id="statPorCancha">—</div>
        <div class="delta" id="deltaPorCancha"></div>
      </div>
      <div class="stat-tile">
        <div class="k">Ocupación promedio</div>
        <div class="v" id="statOcupacion">—</div>
        <div class="delta" id="deltaOcupacion"></div>
      </div>
    </div>` : ''}
    ${(hayDias || hayHorasOcup) ? `
    <div class="grid2">
      <div class="card">
        <h2>Ingreso diario</h2>
        ${hayDias ? '<div class="barschart" id="chartIngresoDiario"></div>' : '<div class="empty">Sin datos.</div>'}
      </div>
      <div class="card">
        <h2>Ocupación diaria</h2>
        ${hayDias ? '<div class="barschart" id="chartOcupacionDiaria"></div>' : '<div class="empty">Sin datos.</div>'}
      </div>
    </div>
    <div class="card">
      <h2>Ocupación por hora del día</h2>
      ${hayHorasOcup ? '<div class="hourschart" id="chartHoras2"></div>' : '<div class="empty">Sin datos.</div>'}
    </div>` : ''}
    <div class="card">
      <h2>Ocupación vs. precio — mapa competitivo</h2>
      <p class="sub">Tamaño de burbuja = canchas · línea = rango de precio (mín–máx) · club seleccionado en rojo</p>
      ${hayCuadrante ? '<svg id="svgCuadrante" viewBox="0 0 690 390"></svg><p class="note" id="notaExcluidos"></p>' : '<div class="empty">Sin datos de precio para este club o sus vecinos, esta semana.</div>'}
    </div>
    <div class="card">
      <h2>Precio promedio por hora del día</h2>
      <p class="sub">Club seleccionado en rojo, cada vecino con su propio color</p>
      ${hayHoras ? '<svg id="svgHoras" viewBox="0 0 630 340"></svg><div class="legend" id="leyendaHoras"></div>' : '<div class="empty">Sin datos de precio por hora esta semana.</div>'}
    </div>
    <div class="card">
      <h2>Ingreso esta semana</h2>
      <p class="sub" id="subIngresoSemana"></p>
      ${hayIngresoSemana ? '<svg id="svgIngresoSemana"></svg>' : '<div class="empty">Sin datos de ingreso esta semana.</div>'}
    </div>
    <div class="card">
      <h2>Ingreso por cancha — misma semana</h2>
      <p class="sub">Normalizado por tamaño de club</p>
      ${hayIngresoSemana ? '<svg id="svgIngresoCancha"></svg>' : '<div class="empty">Sin datos esta semana.</div>'}
    </div>
    <div class="card">
      <h2>Tendencia de ingreso semanal</h2>
      <p class="sub">Top 7 por ingreso acumulado + club seleccionado + resto agrupado como "Otros"</p>
      ${hayTendencia ? '<svg id="svgTendencia" viewBox="0 0 700 320"></svg><div class="legend" id="leyendaTendencia"></div>' : '<div class="empty">Sin histórico suficiente.</div>'}
    </div>
  `;

  if (hayResumen) dibujarResumen(data);
  if (hayDias) dibujarDiario(data);
  if (hayHorasOcup) dibujarHorasOcupacion(data);
  if (hayCuadrante) dibujarCuadrante(data);
  if (hayHoras) dibujarHoras(data);
  if (hayIngresoSemana) dibujarIngresoSemana(data);
  if (hayTendencia) dibujarTendencia(data);
}

// ============ 0) RESUMEN DEL CLUB (stat tiles + diario + horas) ============
function deltaHTML(curr, prev, isPct) {
  if (prev == null || curr == null) return '';
  const diff = curr - prev;
  const pctChange = prev !== 0 ? (diff / Math.abs(prev)) * 100 : 0;
  const cls = Math.abs(pctChange) < 0.5 ? 'flat' : (diff > 0 ? 'up' : 'down');
  const arrow = Math.abs(pctChange) < 0.5 ? '→' : (diff > 0 ? '↑' : '↓');
  const label = isPct
    ? `${diff > 0 ? '+' : ''}${diff.toFixed(1)}pp`
    : `${diff > 0 ? '+' : ''}${fmtMXN(diff)} (${pctChange > 0 ? '+' : ''}${pctChange.toFixed(0)}%)`;
  return `<span class="${cls}">${arrow} ${label}</span> vs. semana anterior`;
}

function dibujarResumen(data) {
  const s = data.resumen_actual;
  const prev = data.resumen_anterior;
  document.getElementById('statIngreso').textContent = fmtMXN(Number(s.ingreso_estimado_mxn));
  document.getElementById('deltaIngreso').innerHTML = prev
    ? deltaHTML(Number(s.ingreso_estimado_mxn), Number(prev.ingreso_estimado_mxn), false)
    : '<span class="flat">— sin semana anterior</span>';
  document.getElementById('statPorCancha').textContent = fmtMXN(Number(s.ingreso_por_cancha_mxn));
  document.getElementById('deltaPorCancha').innerHTML = prev
    ? deltaHTML(Number(s.ingreso_por_cancha_mxn), Number(prev.ingreso_por_cancha_mxn), false) : '';
  document.getElementById('statOcupacion').textContent = fmtPct(Number(s.ocupacion_prom_pct));
  document.getElementById('deltaOcupacion').innerHTML = prev
    ? deltaHTML(Number(s.ocupacion_prom_pct), Number(prev.ocupacion_prom_pct), true) : '';
}

const DIAS_LABEL = {1:'Lun', 2:'Mar', 3:'Mié', 4:'Jue', 5:'Vie', 6:'Sáb', 7:'Dom'};

function dibujarDiario(data) {
  const dias = data.dias;
  const maxIngreso = Math.max(...dias.map(d => d.ingreso_estimado_mxn != null ? Number(d.ingreso_estimado_mxn) : 0), 1);

  const contI = document.getElementById('chartIngresoDiario');
  const contO = document.getElementById('chartOcupacionDiaria');
  contI.innerHTML = ''; contO.innerHTML = '';
  for (let d = 1; d <= 7; d++) {
    const row = dias.find(x => x.dia_semana === d);
    const ingreso = row && row.ingreso_estimado_mxn != null ? Number(row.ingreso_estimado_mxn) : null;
    const ocup = row && row.ocupacion_prom_pct != null ? Number(row.ocupacion_prom_pct) : null;

    const pctI = ingreso != null ? (ingreso / maxIngreso) * 100 : 0;
    const colI = document.createElement('div');
    colI.className = 'col';
    colI.innerHTML = `<div class="bar" style="height:${pctI}%;" title="${DIAS_LABEL[d]}: ${fmtMXN(ingreso)}"><div class="val">${ingreso != null ? fmtMXN(ingreso) : ''}</div></div><div class="lbl">${DIAS_LABEL[d]}</div>`;
    contI.appendChild(colI);

    const pctO = ocup != null ? ocup : 0;
    const colO = document.createElement('div');
    colO.className = 'col';
    colO.innerHTML = `<div class="bar" style="height:${pctO}%;" title="${DIAS_LABEL[d]}: ${fmtPct(ocup)}"><div class="val">${ocup != null ? fmtPct(ocup) : ''}</div></div><div class="lbl">${DIAS_LABEL[d]}</div>`;
    contO.appendChild(colO);
  }
}

function dibujarHorasOcupacion(data) {
  const horas = data.horas_ocupacion;
  const maxVal = Math.max(...horas.map(h => h.ocupacion || 0), 1);
  const cont = document.getElementById('chartHoras2');
  cont.innerHTML = '';
  horas.forEach(h => {
    const pct = (h.ocupacion / maxVal) * 100;
    const col = document.createElement('div');
    col.className = 'col';
    col.innerHTML = `<div class="bar" style="height:${pct}%;" title="${h.hora}: ${fmtPct(h.ocupacion)}"><div class="val">${Math.round(h.ocupacion)}%</div></div><div class="lbl">${h.hora}</div>`;
    cont.appendChild(col);
  });
}

// ============ 1) CUADRANTE ============
function dibujarCuadrante(data) {
  const cuad = data.cuadrante;
  const todos = [cuad.club, ...cuad.vecinos];
  const precios = todos.map(c => Number(c.precio_prom));
  const ocupaciones = todos.map(c => Number(c.ocupacion_prom));
  const canchas = todos.map(c => c.canchas || 1);

  const medPrecio = mediana(precios), medOcup = mediana(ocupaciones);
  const xMin = Math.min(...precios) - 80, xMax = Math.max(...precios) + 80;
  const PX0 = 80, PX1 = 660, PY0 = 30, PY1 = 360;
  const sx = p => PX0 + (p - xMin) / (xMax - xMin) * (PX1 - PX0);
  const sy = o => PY1 - o / 100 * (PY1 - PY0);
  const minC = Math.min(...canchas), maxC = Math.max(...canchas);
  const radius = c => maxC === minC ? 12 : 7 + (c - minC) / (maxC - minC) * 16;

  const mx = sx(medPrecio), my = sy(medOcup);
  let svg = '';
  svg += `<rect x="${mx}" y="${PY0}" width="${PX1-mx}" height="${my-PY0}" fill="var(--good-wash)"/>`;
  svg += `<rect x="${PX0}" y="${PY0}" width="${mx-PX0}" height="${my-PY0}" fill="var(--series-1-wash)"/>`;
  svg += `<rect x="${PX0}" y="${my}" width="${mx-PX0}" height="${PY1-my}" fill="var(--warn-wash)"/>`;
  svg += `<rect x="${mx}" y="${my}" width="${PX1-mx}" height="${PY1-my}" fill="var(--crit-wash)"/>`;
  svg += `<text x="${mx+10}" y="${PY0+16}" class="quad-label good">LÍDERES</text>`;
  svg += `<text x="${PX0+10}" y="${PY0+16}" class="quad-label blue">RETADORES</text>`;
  svg += `<text x="${PX0+10}" y="${PY1-10}" class="quad-label warn">EN DIFICULTAD</text>`;
  svg += `<text x="${mx+10}" y="${PY1-10}" class="quad-label crit">SOBREPRECIO</text>`;
  svg += `<line x1="${PX0}" y1="${PY1}" x2="${PX1}" y2="${PY1}" stroke="var(--baseline)"/>`;
  svg += `<line x1="${PX0}" y1="${PY0}" x2="${PX0}" y2="${PY1}" stroke="var(--baseline)"/>`;
  for (const yv of [0,20,40,60,80,100]) {
    const yy = sy(yv);
    svg += `<line x1="${PX0}" y1="${yy}" x2="${PX1}" y2="${yy}" stroke="var(--gridline)"/>`;
    svg += `<text x="${PX0-8}" y="${yy+4}" text-anchor="end" class="axis-lbl">${yv}%</text>`;
  }
  const xStep = Math.round((xMax - xMin) / 5 / 50) * 50 || 50;
  for (let xv = Math.ceil(xMin/xStep)*xStep; xv <= xMax; xv += xStep) {
    svg += `<text x="${sx(xv)}" y="${PY1+18}" text-anchor="middle" class="axis-lbl">$${xv}</text>`;
  }
  for (const c of todos) {
    const y = sy(Number(c.ocupacion_prom));
    const isSel = c.id === cuad.club.id;
    const col = isSel ? 'var(--series-focus)' : 'var(--gridline)';
    svg += `<line x1="${sx(Number(c.precio_min))}" y1="${y}" x2="${sx(Number(c.precio_max))}" y2="${y}" stroke="${col}" stroke-width="4" stroke-linecap="round" opacity="0.55"/>`;
  }
  const labels = [];
  for (const c of todos) {
    const x = sx(Number(c.precio_prom)), y = sy(Number(c.ocupacion_prom)), r = radius(c.canchas || 1);
    const isSel = c.id === cuad.club.id;
    const fill = isSel ? 'var(--series-focus)' : 'var(--series-1)';
    svg += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(1)}" fill="${fill}" fill-opacity="${isSel?0.95:0.8}" stroke="var(--surface-1)" stroke-width="1.5"><title>${c.nombre}: $${c.precio_prom}/hr, ${c.ocupacion_prom}%, ${c.canchas||'?'} canchas</title></circle>`;
    labels.push([x, y-r-6, c.nombre, isSel]);
  }
  for (const [x,y,name,isSel] of labels) {
    svg += `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="middle" class="pt-label${isSel?' focus':''}">${name}</text>`;
  }
  document.getElementById('svgCuadrante').innerHTML = svg;
  document.getElementById('notaExcluidos').textContent = cuad.sin_precio.length
    ? `Excluidos por falta de precio: ${cuad.sin_precio.join(', ')}.` : '';
}

// ============ 2) PRECIO POR HORA ============
function colorLineaPorIndice(i) {
  // ángulo dorado: buena separación visual entre N líneas sin tener que
  // elegir a mano, evita el rojo (reservado para el club seleccionado)
  const hue = (40 + i * 137.508) % 360;
  return `hsl(${hue.toFixed(0)}, 62%, 45%)`;
}

function dibujarHoras(data) {
  const porClub = data.precio_hora;
  const clubId = data.club.id;
  const horas = [...new Set(Object.values(porClub).flat().map(p => p.hora))].sort();
  const todosPrecios = Object.values(porClub).flat().map(p => p.precio);
  const yMin = Math.min(...todosPrecios) - 40, yMax = Math.max(...todosPrecios) + 60;
  const PX0 = 60, PX1 = 600, PY0 = 20, PY1 = 300;
  const sx = (i, n) => PX0 + i/(n-1) * (PX1-PX0);
  const sy = v => PY1 - (v - yMin)/(yMax-yMin) * (PY1-PY0);

  let svg = `<line x1="${PX0}" y1="${PY1}" x2="${PX1}" y2="${PY1}" stroke="var(--baseline)"/>`;
  const yStep = Math.round((yMax - yMin) / 4 / 50) * 50 || 50;
  for (let yv = Math.ceil(yMin/yStep)*yStep; yv <= yMax; yv += yStep) {
    const yy = sy(yv);
    svg += `<line x1="${PX0}" y1="${yy}" x2="${PX1}" y2="${yy}" stroke="var(--gridline)"/>`;
    svg += `<text x="${PX0-8}" y="${yy+4}" text-anchor="end" class="axis-lbl">$${yv}</text>`;
  }
  horas.forEach((h, i) => {
    if (i % 2 === 0) svg += `<text x="${sx(i,horas.length)}" y="${PY1+16}" text-anchor="middle" class="axis-lbl">${h}</text>`;
  });

  // orden estable (por id) para que cada club siempre tenga el mismo color
  // entre una carga y otra, y el club seleccionado se dibuje al final (encima)
  const otros = Object.keys(porClub).filter(id => id !== clubId).sort();
  const coloresPorId = {};
  otros.forEach((id, i) => { coloresPorId[id] = colorLineaPorIndice(i); });

  const orden = [...otros, ...(porClub[clubId] ? [clubId] : [])];
  let focusEnd = null;
  const leyenda = [];
  for (const id of orden) {
    const pts = porClub[id];
    const isSel = id === clubId;
    const ordered = [...pts].sort((a,b) => horas.indexOf(a.hora) - horas.indexOf(b.hora));
    const path = ordered.map((p,i) => `${i===0?'M':'L'}${sx(horas.indexOf(p.hora),horas.length).toFixed(1)},${sy(p.precio).toFixed(1)}`).join(' ');
    const stroke = isSel ? 'var(--series-focus)' : coloresPorId[id];
    svg += `<path d="${path}" fill="none" stroke="${stroke}" stroke-width="${isSel?3:1.6}" opacity="${isSel?1:0.85}"><title>${data.nombres[id]}</title></path>`;
    leyenda.push({ id, nombre: data.nombres[id], color: stroke, isSel });
    if (isSel && ordered.length) {
      const last = ordered[ordered.length-1];
      focusEnd = [sx(horas.indexOf(last.hora),horas.length), sy(last.precio)];
    }
  }
  if (focusEnd) {
    svg += `<circle cx="${focusEnd[0].toFixed(1)}" cy="${focusEnd[1].toFixed(1)}" r="3.5" fill="var(--series-focus)"/>`;
  }
  document.getElementById('svgHoras').innerHTML = svg;

  const leg = document.getElementById('leyendaHoras');
  if (leg) {
    leyenda.sort((a,b) => (b.isSel?1:0) - (a.isSel?1:0));
    leg.innerHTML = leyenda.map(l =>
      `<div class="item${l.isSel?' focus':''}"><span class="dot" style="background:${l.color}"></span>${l.nombre}</div>`
    ).join('');
  }
}

// ============ 3) INGRESO ESTA SEMANA + POR CANCHA ============
function barChart(svgEl, rows, valueKey, clubId, nombres) {
  const sorted = [...rows].sort((a,b) => b.val - a.val);
  const maxVal = Math.max(...sorted.map(r => r.val));
  const labelX = 195, barX = 200, maxWidth = 400, barH = 22, gap = 8;
  let svg = '';
  sorted.forEach((r, i) => {
    const y = i * (barH + gap);
    const isSel = r.id === clubId;
    const w = maxVal ? r.val / maxVal * maxWidth : 0;
    const color = isSel ? 'var(--series-focus)' : 'var(--series-1)';
    svg += `<g transform="translate(0,${y})">`;
    svg += `<text x="${labelX}" y="${barH/2+4}" text-anchor="end" class="bar-lbl${isSel?' focus':''}">${nombres[r.id]}</text>`;
    svg += `<rect x="${barX}" y="2" width="${w.toFixed(1)}" height="${barH-4}" rx="3" fill="${color}"/>`;
    svg += `<text x="${(barX+w+6).toFixed(1)}" y="${barH/2+4}" class="bar-val">${fmtMXN(r.val)}</text>`;
    svg += '</g>';
  });
  const totalH = sorted.length * (barH + gap);
  svgEl.setAttribute('viewBox', `0 0 700 ${totalH}`);
  svgEl.innerHTML = svg;
}

function dibujarIngresoSemana(data) {
  const rows = Object.entries(data.ingreso_semana)
    .filter(([id, r]) => r.ingreso_estimado_mxn != null)
    .map(([id, r]) => ({ id, val: Number(r.ingreso_estimado_mxn) }));
  const rowsCancha = Object.entries(data.ingreso_semana)
    .filter(([id, r]) => r.ingreso_por_cancha_mxn != null)
    .map(([id, r]) => ({ id, val: Number(r.ingreso_por_cancha_mxn) }));
  const f = new Date(data.semana + 'T00:00:00');
  document.getElementById('subIngresoSemana').textContent =
    'Semana del ' + f.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
  barChart(document.getElementById('svgIngresoSemana'), rows, 'val', data.club.id, data.nombres);
  barChart(document.getElementById('svgIngresoCancha'), rowsCancha, 'val', data.club.id, data.nombres);
}

// ============ 4) TENDENCIA SEMANAL ============
const ROJO = '#e34948';

function colorTendenciaPorIndice(i) {
  // mismo criterio de ángulo dorado que la gráfica de precio por hora —
  // escala a cualquier cantidad de series sin repetir color, reservando
  // el rojo para el club seleccionado
  const hue = (40 + i * 137.508) % 360;
  return `hsl(${hue.toFixed(0)}, 62%, 45%)`;
}

function dibujarTendencia(data) {
  const clubId = data.club.id;
  const porClub = {};
  const semanasSet = new Set();
  for (const r of data.tendencia_rows) {
    if (r.ingreso_estimado_mxn == null) continue;
    porClub[r.id] = porClub[r.id] || {};
    porClub[r.id][r.semana_inicio] = Number(r.ingreso_estimado_mxn);
    semanasSet.add(r.semana_inicio);
  }
  const semanas = [...semanasSet].sort();
  const totales = Object.fromEntries(Object.entries(porClub).map(([id, v]) => [id, Object.values(v).reduce((a,b)=>a+b,0)]));
  let topIds = Object.keys(totales).sort((a,b) => totales[b]-totales[a]).slice(0,10);
  if (!topIds.includes(clubId)) topIds = [...topIds.slice(0,9), clubId];
  const restoIds = Object.keys(porClub).filter(id => !topIds.includes(id));

  let series = topIds.map(id => ({ id, nombre: data.nombres[id] }));
  if (restoIds.length) series.push({ id: 'OTROS', nombre: 'Otros clubes cercanos' });
  series.sort((a,b) => {
    const ta = a.id==='OTROS' ? restoIds.reduce((s,id)=>s+(totales[id]||0),0) : totales[a.id];
    const tb = b.id==='OTROS' ? restoIds.reduce((s,id)=>s+(totales[id]||0),0) : totales[b.id];
    return tb - ta;
  });

  let colorIter = 0;
  const colores = series.map(s => s.id === clubId ? ROJO : colorTendenciaPorIndice(colorIter++));

  const matriz = semanas.map(s => series.map(ser => {
    if (ser.id === 'OTROS') return restoIds.reduce((sum, id) => sum + (porClub[id]?.[s] || 0), 0);
    return porClub[ser.id]?.[s] || 0;
  }));

  const PX0 = 50, PX1 = 560, PY0 = 20, PY1 = 300;
  const n = semanas.length;
  const totalesPorSemana = matriz.map(fila => fila.reduce((a,b)=>a+b,0));
  const yMax = Math.max(...totalesPorSemana) * 1.08;
  const sx = i => PX0 + i/(n-1) * (PX1-PX0);
  const sy = v => PY1 - v/yMax * (PY1-PY0);

  let svg = `<line x1="${PX0}" y1="${PY1}" x2="${PX1}" y2="${PY1}" stroke="var(--baseline)"/>`;
  const gStep = yMax > 1500000 ? 500000 : 250000;
  for (let gv = 0; gv <= yMax; gv += gStep) {
    const yy = sy(gv);
    svg += `<line x1="${PX0}" y1="${yy}" x2="${PX1}" y2="${yy}" stroke="var(--gridline)"/>`;
    svg += `<text x="${PX0-8}" y="${yy+4}" text-anchor="end" class="axis-lbl">$${(gv/1000).toLocaleString('es-MX')}k</text>`;
  }
  const step = Math.max(1, Math.floor(n/8));
  for (let i = 0; i < n; i += step) {
    svg += `<text x="${sx(i).toFixed(1)}" y="${PY1+16}" text-anchor="middle" class="axis-lbl">${semanas[i].slice(5)}</text>`;
  }

  // acumulados [semana][serie] = [inicio, fin] en unidades de datos — se
  // guardan para las etiquetas del lado derecho y para el hover
  const acumulados = semanas.map(() => []);
  let cumPrev = new Array(n).fill(0);
  series.forEach((ser, sIdx) => {
    const cumNext = cumPrev.map((v,i) => v + matriz[i][sIdx]);
    const top = cumNext.map((v,i) => `${sx(i).toFixed(1)},${sy(v).toFixed(1)}`).join(' ');
    const bottom = [...cumPrev.map((v,i) => `${sx(i).toFixed(1)},${sy(v).toFixed(1)}`)].reverse().join(' ');
    const isSel = ser.id === clubId;
    svg += `<polygon points="${top} ${bottom}" fill="${colores[sIdx]}" fill-opacity="0.85" stroke="${isSel?'var(--text-primary)':'var(--surface-1)'}" stroke-width="${isSel?2:1}"/>`;
    for (let i = 0; i < n; i++) acumulados[i][sIdx] = [cumPrev[i], cumNext[i]];
    cumPrev = cumNext;
  });

  // etiquetas de ingreso a la derecha — nivel que alcanza cada club en la
  // última semana, a la altura media de su franja
  const ultima = n - 1;
  series.forEach((ser, sIdx) => {
    const [ini, fin] = acumulados[ultima][sIdx];
    if (fin - ini <= 0) return; // sin datos esa semana, no hay dónde poner la etiqueta
    const yMid = sy((ini + fin) / 2);
    const isSel = ser.id === clubId;
    const fillAttr = isSel ? '' : ` fill="${colores[sIdx]}"`;
    svg += `<text x="${PX1+8}" y="${(yMid+3).toFixed(1)}" class="end-lbl${isSel?' focus':''}"${fillAttr}>${fmtMXN(matriz[ultima][sIdx])}</text>`;
  });

  // columnas invisibles para detectar hover por semana + franja
  for (let i = 0; i < n; i++) {
    const xMid = sx(i);
    const xIni = i === 0 ? PX0 : (sx(i-1) + xMid) / 2;
    const xFin = i === n-1 ? PX1 : (xMid + sx(i+1)) / 2;
    svg += `<rect class="hover-col" x="${xIni.toFixed(1)}" y="${PY0}" width="${(xFin-xIni).toFixed(1)}" height="${PY1-PY0}" data-semana="${i}"/>`;
  }

  const svgEl = document.getElementById('svgTendencia');
  svgEl.innerHTML = svg;

  const tooltip = document.getElementById('chartTooltip');
  function svgCoords(evt) {
    const pt = svgEl.createSVGPoint();
    pt.x = evt.clientX; pt.y = evt.clientY;
    return pt.matrixTransform(svgEl.getScreenCTM().inverse());
  }
  svgEl.querySelectorAll('.hover-col').forEach(rect => {
    rect.addEventListener('mousemove', (evt) => {
      const semanaIdx = parseInt(rect.dataset.semana);
      const { y } = svgCoords(evt);
      const valorY = (PY1 - y) / (PY1 - PY0) * yMax;
      let sIdx = acumulados[semanaIdx].findIndex(([ini, fin]) => valorY >= ini && valorY <= fin);
      if (sIdx === -1) { tooltip.style.display = 'none'; return; }
      const ser = series[sIdx];
      const val = matriz[semanaIdx][sIdx];
      const semanaLbl = semanas[semanaIdx];
      const f = new Date(semanaLbl + 'T00:00:00');
      const fechaTxt = f.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
      tooltip.innerHTML = `
        <div class="tt-club"><span class="tt-dot" style="background:${colores[sIdx]}"></span>${ser.nombre}</div>
        <div class="tt-val">Semana del ${fechaTxt}: ${fmtMXN(val)}</div>
      `;
      tooltip.style.display = 'block';
      tooltip.style.left = (evt.clientX + 14) + 'px';
      tooltip.style.top = (evt.clientY + 14) + 'px';
    });
    rect.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
  });

  const leg = document.getElementById('leyendaTendencia');
  leg.innerHTML = series.map((s, i) =>
    `<div class="item${s.id===clubId?' focus':''}"><span class="dot" style="background:${colores[i]}"></span>${s.nombre}</div>`
  ).join('');
}

Promise.all([cargarClubes(), cargarSemanas()]);
